<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>清醒大冒險｜躲酒精小遊戲</title>
<style>
:root{
  --bg:#140f0a;--bg2:#1d150c;--cream:#f6ecd8;--muted:#bda988;--faint:#8a795e;
  --amber:#f0b54a;--amber2:#d4892a;--gold:#0600bb;--red:#e24a3a;--green:#7ac77a;
  --serif:"Playfair Display","Noto Serif TC",Georgia,serif;
  --han:"Noto Serif TC","Songti TC",serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{margin:0;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--cream);
  font-family:var(--han);display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100dvh;padding:14px;overflow:hidden;touch-action:none}
.title{font-family:var(--serif);font-weight:900;font-size:clamp(20px,4.5vw,30px);letter-spacing:.01em;margin:0 0 10px;text-align:center}
.title em{font-style:italic;color:var(--amber)}
.frame{position:relative;width:min(960px,96vw);aspect-ratio:16/9;border-radius:14px;overflow:hidden;
  border:3px solid var(--amber);box-shadow:0 22px 60px rgba(0,0,0,.5),0 0 0 1px rgba(240,181,74,.3)}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;background:#48a7ff}

/* overlays */
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;background:rgba(20,15,10,.86);backdrop-filter:blur(3px);padding:22px;z-index:5}
.overlay.hide{display:none}
.overlay h2{font-family:var(--serif);font-size:clamp(26px,6vw,46px);margin:0 0 10px;font-weight:900}
.overlay h2.win{color:var(--green)}.overlay h2.lose{color:var(--red)}
.overlay p{color:var(--muted);max-width:42ch;line-height:1.7;margin:0 0 8px;font-size:15px}
.keys{color:var(--faint);font-size:13px;margin:14px 0 22px;line-height:1.9}
.keys b{color:var(--cream)}
.btn{border:0;border-radius:13px;padding:15px 38px;font:inherit;font-weight:800;font-size:16px;cursor:pointer;
  background:linear-gradient(100deg,var(--amber),var(--amber2));color:#2a1c08;box-shadow:0 12px 30px rgba(240,181,74,.3);transition:.2s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.07)}
a.btn{display:inline-block;text-decoration:none;text-align:center}
.btn.ghost{background:rgba(246,236,216,.08);color:var(--muted);box-shadow:none}
.btn.ghost:hover{background:rgba(226,74,58,.14);color:#fff}
.btnrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.score-final{font-family:var(--serif);font-size:34px;color:var(--gold);margin:6px 0 4px}

/* touch controls */
.touch{display:none;pointer-events:none;width:min(960px,96vw);margin-top:10px;z-index:4}
.touch.on{display:flex;justify-content:space-between;align-items:center}
.tbtn{width:64px;height:64px;border-radius:50%;
  background:rgba(246,236,216,.14);border:2px solid rgba(246,236,216,.3);
  display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--cream);
  pointer-events:auto;user-select:none;backdrop-filter:blur(2px)}
.tbtn:active{background:rgba(226,74,58,.4)}
#tLeft{margin-left:18px}
#tRight{margin-right:auto;margin-left:12px}
#tJump{margin-right:18px;width:78px;height:78px;background:rgba(240,181,74,.25)}
.hintbar{margin-top:12px;color:var(--faint);font-size:12.5px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<h1 class="title">清醒大冒險 <em>· 躲酒精</em></h1>
<div class="frame">
  <canvas id="game" width="640" height="360"></canvas>

  <div class="overlay" id="startScr">
    <h2>清醒<span style="color:var(--amber)">大冒險</span></h2>
    <p>酒精怪擋在回家的路上。跳過它們、或從上面踩扁它們,撿醫藥箱補命,平安抵達終點旗!小心多層平台上也藏著酒精怪。</p>
    <div class="keys">
      電腦:<b>← →</b> 移動　<b>空白鍵 / ↑</b> 跳<br>
      手機:畫面下方按鈕操作<br>
      ❤ 三條命 · 踩酒精怪 +100 · 醫藥箱回血
    </div>
    <button class="btn" id="startBtn">開始遊戲</button>
    <p style="margin-top:14px"><a href="alcohol_bac_simulator.html" style="color:var(--amber);font-size:13px">略過遊戲,直接填問卷 →</a></p>
  </div>

  <div class="overlay hide" id="endScr">
    <h2 id="endTitle"></h2>
    <div class="score-final" id="endScore"></div>
    <p id="endMsg"></p>
    <div class="btnrow">
      <a class="btn" id="toSurveyBtn" href="alcohol_bac_simulator.html">前往問卷 →</a>
      <button class="btn ghost" id="againBtn">再玩一次</button>
    </div>
  </div>


</div>
   <!-- touch controls -->
  <div class="touch" id="touch">
    <div class="tbtn" id="tLeft">◀</div>
    <div class="tbtn" id="tRight">▶</div>
    <div class="tbtn" id="tJump">⤒</div>
  </div>

<div class="hintbar">推廣理性飲酒觀念，建立健康生活文化</div>

<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
const SPR={};
['player','player_cap','enemy','token','brick','heart','heart_empty','cloud','hill_1','hill_2','hill_3'].forEach(k=>{
  const img=new Image();
  img.onload=()=>SPR[k]=img;
  img.src='public/'+k+'.png';
});

const W=cv.width,H=cv.height;

/* ---------- palette (site colors) ---------- */
const COL={
  sky1:'#5b8fe0', sky2:'#7fa9ec',
  ground:'#d4892a', groundDark:'#b5731f', groundTop:'#f0b54a',
  brick:'#c8772a', brickLine:'#8a4e16',
  cream:'#f6ecd8', skin:'#f3d8a8',
  player:'#3a78c0', player2:'#2a5a96', cap:'#e24a3a',
  enemy:'#9a6bce', enemy2:'#6f3fb0', enemyEye:'#f6ecd8',
  bottle:'#7ac77a', bottleCap:'#cf7e22',
  medkit:'#f6ecd8', medCross:'#e24a3a',
  flag:'#7ac77a', pole:'#bda988', hill:'#3f9d5e', cloud:'#f6ecd8',
  amber:'#f0b54a', gold:'#f7c95e', shadow:'rgba(0,0,0,.25)'
};

/* ---------- world ---------- */
const TILE=32, GRAV=0.62, MOVE=0.85, FRICTION=.80, MAXVX=4.2, JUMP=12.2;
const LEVEL_W=260; // tiles (加長一點,容納更多地形變化)
let cam=0, score=0, lives=3, started=false, ended=false, won=false;
let frame=0;
let demo=false;

/* ===== 安全跳躍上限(由物理模擬驗算得出) =====
   最大跳躍高度 ≈ 3.9 格,助跑水平跨距 ≈ 5.4 格。
   為了「難但保證過得去」,所有設計鎖在保守值:
   - 任兩落腳點水平間距 ≤ 3 格(坑寬最多 3,寬坑必放踏腳石)
   - 任兩落腳點高度差 ≤ 2 格
*/
const MAX_GAP=3;      // 單一可跳坑寬上限
const MAX_STEP=2;     // 上下層高度差上限

/* level layout */
const solids=[]; // {x,y,w,h, ground:bool}  ground=主地面那一排
function addSolid(tx,ty,tw,th,isGround){
  solids.push({x:tx*TILE,y:ty*TILE,w:tw*TILE,h:th*TILE,ground:!!isGround});
}
// 記錄所有「可站立平台頂面」,給怪物/道具生成用 {x,y,w,top:y}
let platforms=[];

const TopRow=9;          // 主地面頂面所在 tile 列
const GROUND_Y=TopRow;   // 沿用舊名

function buildLevel(){
  solids.length=0;
  platforms.length=0;
  const FLAG_TILE=LEVEL_W-6;

  // 起點安全地面
  let x=0;
  addSolid(x,GROUND_Y,12,4,true);
  platforms.push({x:0,y:GROUND_Y*TILE,w:12*TILE});
  x+=12;

  while(x<FLAG_TILE-16){
    // --- 決定這次的坑 ---
    // 30% 機率做「寬坑+踏腳石」: 兩個坑合併,中間放一塊浮石
    let widePit = Math.random()<0.30;

    if(widePit){
      // 寬坑總寬 5~6 格,中間放一塊踏腳石,使任一段間距 ≤ 3
      const total = 5+Math.floor(Math.random()*2); // 5 或 6
      const stoneFromLeft = Math.min(MAX_GAP, Math.ceil(total/2)); // 左側間距≤3
      // 左坑寬 = stoneFromLeft - 0 ... 踏腳石放在 x+stoneFromLeft
      const stoneX = x + stoneFromLeft;
      // 踏腳石高度:與地面同高或高 1 格(製造節奏變化,仍跳得上)
      const stoneRaise = Math.random()<0.5?0:1;
      const stoneY = GROUND_Y - stoneRaise;
      addSolid(stoneX, stoneY, 1, 4, false);
      platforms.push({x:stoneX*TILE, y:stoneY*TILE, w:1*TILE});
      // 右坑:從踏腳石到下一塊地面,間距也要 ≤3
      x += total;
    } else {
      // 普通坑寬 2~3 格
      const gap = 2+Math.floor(Math.random()*(MAX_GAP-1)); // 2 或 3
      x += gap;
    }

    // --- 主地面段 ---
    const len = 5+Math.floor(Math.random()*6); // 5~10
    addSolid(x,GROUND_Y,len,4,true);
    platforms.push({x:x*TILE,y:GROUND_Y*TILE,w:len*TILE});

    // --- 第二層(再高一層樓)---
    // 在較長的地面段上,用階梯踏腳石搭出第二層平台
    if(len>=6 && Math.random()<0.5){
      const step1Y = GROUND_Y - MAX_STEP;        // 上 2 格
      const baseX  = x + 1 + Math.floor(Math.random()*2);
      const upLen  = 2+Math.floor(Math.random()*2); // 第二層平台寬 2~3
      if(baseX+upLen < x+len-1){
        addSolid(baseX, step1Y, upLen, 1, false);
        platforms.push({x:baseX*TILE, y:step1Y*TILE, w:upLen*TILE});

        // --- 偶爾再搭第三層 ---
        if(Math.random()<0.4){
          const step2Y = step1Y - MAX_STEP;       // 再上 2 格
          const base2X = baseX + (Math.random()<0.5?1:-1)*1; // 水平錯開1格
          const up2Len = 2;
          // 確認第三層落在主地面段範圍內
          if(base2X>=x+1 && base2X+up2Len < x+len-1){
            addSolid(base2X, step2Y, up2Len, 1, false);
            platforms.push({x:base2X*TILE, y:step2Y*TILE, w:up2Len*TILE});
          }
        }
      }
    } else if(Math.random()<0.45){
      // 否則放一塊普通浮空平台(上 2 格)
      const py = GROUND_Y - MAX_STEP;
      const pw = 2+Math.floor(Math.random()*2);
      const pxMax = len-pw-1;
      if(pxMax>=1){
        const pxs = x+1+Math.floor(Math.random()*pxMax);
        addSolid(pxs,py,pw,1,false);
        platforms.push({x:pxs*TILE,y:py*TILE,w:pw*TILE});
      }
    }

    x+=len;
  }

  // 終點長地面
  const endLen=Math.max(16,FLAG_TILE-x+6);
  addSolid(x,GROUND_Y,endLen,4,true);
  platforms.push({x:x*TILE,y:GROUND_Y*TILE,w:endLen*TILE});
}

/* enemies (alcohol monsters) — 每一層平台都可能生怪 */
let enemies=[];
function buildEnemies(){
  enemies=[];
  for(const p of platforms){
    if(p.x < 16*TILE) continue;              // 起點附近不放
    if(p.x > flag.x - TILE*5) continue;      // 終點附近不放
    if(p.w < TILE*2) continue;               // 太短(像單格踏腳石)不放

    // 每塊平台生怪機率,平台越寬越可能有怪
    const wideBonus = p.w>=TILE*5 ? 0.18 : 0;
    if(Math.random() > (0.42 + wideBonus)) continue;

    // 寬平台可能放兩隻
    const howMany = (p.w>=TILE*7 && Math.random()<0.45) ? 2 : 1;
    for(let n=0;n<howMany;n++){
      const margin=TILE;
      const ex = p.x + margin + Math.random()*Math.max(1, p.w - margin*2 - 26);
      const ey = p.y - 30;
      enemies.push({
        x:ex, y:ey, w:26, h:30,
        vx:(enemies.length%2?-1:1)*(1.0+Math.random()*0.4), // 1.0~1.4,比原版快
        alive:true, t:enemies.length*7,
        homeTop:p.y                          // 記住自己這層的地面高度
      });
      if(enemies.length>=32) break;
    }
    if(enemies.length>=32) break;
  }
}

/* medkits — 只放在主地面,且檢查上方淨空,不卡進建築 */
let kits=[];
function buildKits(){
  kits=[];
  let count=0;
  for(const p of platforms){
    if(p.y!==GROUND_Y*TILE)continue;          // 只放主地面
    if(p.x > flag.x - TILE*4)continue;
    if(p.w < TILE*3)continue;
    if(Math.random()<0.35 && count<6){
      const kx=p.x+Math.floor(p.w/2)-12;
      const ky=(GROUND_Y-2)*TILE;
      const box={x:kx,y:ky,w:24,h:22};
      let blocked=false;
      for(const o of solids){
        if(box.x<o.x+o.w&&box.x+box.w>o.x&&box.y<o.y+o.h&&box.y+box.h>o.y){blocked=true;break}
      }
      if(blocked)continue;                    // 會卡進建築,放棄
      kits.push({...box,taken:false,t:count*11});
      count++;
    }
  }
}

/* amber tokens — 沿各層平台上方撒,不卡進磚塊、不越過終點 */
let tokens=[];
function buildTokens(){
  tokens=[];
  for(const p of platforms){
    if(p.x > flag.x - TILE*4)continue;
    const tilesWide=Math.floor(p.w/TILE);
    if(tilesWide<2)continue;
    for(let i=1;i<tilesWide-1;i+=2){
      if(Math.random()<0.5)continue;
      const tx=p.x+i*TILE+TILE/2;
      const ty=p.y-TILE*(1+Math.floor(Math.random()*2));
      if(tx>=flag.x-TILE*3)continue;
      let blocked=false;
      for(const o of solids){
        if(tx>o.x&&tx<o.x+o.w&&ty>o.y&&ty<o.y+o.h){blocked=true;break}
      }
      if(blocked)continue;
      tokens.push({x:tx,y:ty,r:7,taken:false,t:tokens.length*5});
    }
  }
}

/* flag at end */
const flag={x:(LEVEL_W-6)*TILE,y:(GROUND_Y-7)*TILE,w:6,h:7*TILE};

/* player */
const P={x:60,y:0,w:24,h:30,vx:0,vy:0,onGround:false,face:1,inv:0,dead:false};

/* input */
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp',' '].includes(e.key))e.preventDefault();
  keys[e.key]=true;
  if(e.key==='d'||e.key==='D'){
    demo=!demo;
    if(demo && !started){
      document.getElementById('startScr').classList.add('hide');
      reset(true);started=true;ended=false;
    }
  }
});
addEventListener('keyup',e=>keys[e.key]=false);
// touch
function bindTouch(id,k){
  const el=document.getElementById(id);
  const set=v=>e=>{e.preventDefault();keys[k]=v};
  el.addEventListener('touchstart',set(true),{passive:false});
  el.addEventListener('touchend',set(false),{passive:false});
  el.addEventListener('touchcancel',set(false),{passive:false});
  el.addEventListener('mousedown',set(true));
  el.addEventListener('mouseup',set(false));
  el.addEventListener('mouseleave',set(false));
}
bindTouch('tLeft','ArrowLeft');bindTouch('tRight','ArrowRight');bindTouch('tJump',' ');
if('ontouchstart' in window)document.getElementById('touch').classList.add('on');

/* ---------- physics helpers ---------- */
function rectHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function collideSolids(o){
  o.onGround=false;
  o.x+=o.vx;
  for(const s of solids){if(rectHit(o,s)){
    if(o.vx>0)o.x=s.x-o.w; else if(o.vx<0)o.x=s.x+s.w; o.vx=0;
  }}
  o.y+=o.vy;
  for(const s of solids){if(rectHit(o,s)){
    if(o.vy>0){o.y=s.y-o.h;o.onGround=true} else if(o.vy<0)o.y=s.y+s.h; o.vy=0;
  }}
}

function reset(full){
  buildLevel();buildEnemies();buildKits();buildTokens();
  P.x=60;P.y=(GROUND_Y-2)*TILE;P.vx=0;P.vy=0;P.inv=0;P.dead=false;P.face=1;
  cam=0;
  if(full){score=0;lives=3;won=false;ended=false}
}
function respawn(){
  // demo 展示模式:把 AI 放到前方下一塊地面的「左緣往內一點」,
  // 並預先給它一段助跑速度,避免在同一個坑邊無限掉落
  if(demo){
    let next=null;
    for(const s of solids){
      if(s.y!==GROUND_Y*TILE)continue;
      if(s.x > P.x+TILE*0.5){                 // 前方的下一塊主地面
        if(!next || s.x<next.x) next=s;
      }
    }
    if(next){
      P.x=next.x+TILE*1.5;                     // 落在對岸,留點空間
      P.y=next.y-P.h-30;
      P.vx=MAXVX; P.vy=0; P.face=1;
      P.dead=false; P.inv=60;
      return;
    }
  }
  let best=null,bestDist=1e9;
  for(const s of solids){
    if(s.y!==GROUND_Y*TILE)continue;
    const cx=Math.max(s.x,Math.min(P.x,s.x+s.w-P.w));
    const d=Math.abs(cx-P.x);
    if(d<bestDist){bestDist=d;best={x:cx,y:s.y-P.h};}
  }
  if(best){P.x=best.x;P.y=best.y-40;}
  else{P.x=Math.max(60,P.x-80);P.y=0;}
  P.vx=0;P.vy=0;P.dead=false;P.inv=90;
}

/* ---------- update ---------- */
function update(){
  frame++;

  // ===== 自動展示 AI =====
  if(!demo){
    if(keys.__ai){keys['ArrowRight']=false;keys[' ']=false;keys.__ai=false;}
  }
  if(demo && !P.dead){
    keys.__ai=true;
    keys['ArrowRight']=true; keys['ArrowLeft']=false;
    let wantJump=false;

    // 找出「前方第一個地面缺口」的左緣 X(坑的起點)
    function nextGapEdge(){
      const footY=P.y+P.h+4;
      let onSolidNow=false;
      for(const s of solids){
        if(P.x+P.w>s.x&&P.x+P.w<s.x+s.w&&footY>=s.y&&footY<s.y+s.h+6){onSolidNow=true;break}
      }
      if(!onSolidNow) return null;       // 已經在空中
      for(let d=0.3; d<=4.0; d+=0.25){
        const probeX=P.x+P.w+d*TILE;
        let solid=false;
        for(const s of solids){
          if(probeX>s.x&&probeX<s.x+s.w&&footY>=s.y&&footY<s.y+s.h+6){solid=true;break}
        }
        if(!solid) return P.x+P.w+d*TILE; // 缺口左緣大約位置
      }
      return null;                        // 前方 4 格內都是實地
    }

    // 物理預測:用「現在起跳」會落在哪,判斷能否安全到達對岸
    function simulateJump(){
      let sx=P.x, sy=P.y, svx=P.vx, svy=-JUMP;
      for(let i=0;i<70;i++){
        svx+=MOVE; svx*=FRICTION;             // 空中持續按右,加速
        if(svx>MAXVX)svx=MAXVX;
        sx+=svx;
        sy+=svy; svy+=GRAV; if(svy>16)svy=16;
        // 下落階段檢查是否踩到某塊平台頂面
        if(svy>0){
          const fx=sx+P.w*0.5, fy=sy+P.h;
          for(const s of solids){
            if(fx>s.x&&fx<s.x+s.w&&fy>=s.y-2&&fy<s.y+s.h){
              return {land:true, x:sx};       // 安全落地
            }
          }
        }
        if(sy>H+40) return {land:false, x:sx}; // 掉出畫面
      }
      return {land:false, x:sx};
    }

    let needJumpNow=false;

    if(P.onGround){
      const gapEdge=nextGapEdge();
      if(gapEdge!==null){
        const distToEdge=gapEdge-(P.x+P.w);
        if(distToEdge<=TILE*1.2){            // 接近坑緣才考慮跳
          const sim=simulateJump();
          // 現在跳能安全落地 → 跳;不能 → 但快踩出邊緣了也只能跳(賭一把,別站著掉)
          if(sim.land || distToEdge<=4) needJumpNow=true;
        }
      }
      // 更高平台/踏腳石擋路 → 跳
      for(const s of solids){
        const dx=s.x-(P.x+P.w);
        if(dx>-6&&dx<TILE*1.4 && s.y<P.y+P.h-4 && s.y>P.y-TILE*3){needJumpNow=true;break}
      }
      // 酒精怪 → 踩
      for(const e of enemies){
        if(!e.alive)continue;
        const dx=e.x-(P.x+P.w);
        if(dx>-6&&dx<TILE*2.0&&Math.abs(e.y-(P.y+P.h))<TILE*1.5){needJumpNow=true;break}
      }
    }

    wantJump=needJumpNow;
    keys[' ']=wantJump;
  }

  if(P.dead){
    P.vy+=GRAV;P.y+=P.vy;
    if(P.y>H+80){
      if(lives<=0){endGame(false)} else {respawn()}
    }
    return;
  }
  // horizontal
  if(keys['ArrowLeft']){P.vx-=MOVE;P.face=-1}
  if(keys['ArrowRight']){P.vx+=MOVE;P.face=1}
  P.vx*=FRICTION;
  P.vx=Math.max(-MAXVX,Math.min(MAXVX,P.vx));
  if(Math.abs(P.vx)<.05)P.vx=0;
  // jump
  if((keys[' ']||keys['ArrowUp'])&&P.onGround){P.vy=-JUMP;P.onGround=false}
  P.vy+=GRAV;if(P.vy>16)P.vy=16;
  collideSolids(P);
  if(P.inv>0)P.inv--;

  if(P.y>H+40 && !P.dead){
    if(demo){respawn();}
    else hurt(true);
  }

  // enemies
  for(const e of enemies){
    if(!e.alive)continue;
    e.t++;
    e.x+=e.vx;
    for(const s of solids){
      if(e.x<s.x+s.w&&e.x+e.w>s.x&&e.y<s.y+s.h&&e.y+e.h>s.y){
        if(e.vx>0)e.x=s.x-e.w; else e.x=s.x+s.w; e.vx*=-1;
      }
    }
    const aheadX=e.vx>0?e.x+e.w+2:e.x-2;
    let support=false;
    for(const s of solids){
      if(aheadX>s.x&&aheadX<s.x+s.w&&Math.abs((e.y+e.h)-s.y)<6){support=true;break}
    }
    if(!support){
      e.vx=-e.vx;
      e.x+=e.vx>0?3:-3;
      if(Math.abs(e.vx)<0.6)e.vx=(e.vx>=0?1:-1)*1.0;
    }
    if(P.inv===0&&!P.dead&&rectHit(P,e)){
      const stomp = P.vy>0 && (P.y+P.h - e.y) < 18;
      if(stomp){e.alive=false;P.vy=-7.5;score+=100;pop(e.x+e.w/2,e.y,'+100')}
      else hurt(false);
    }
  }

  // medkits
  for(const k of kits){
    if(k.taken)continue;k.t++;
    if(rectHit(P,k)){k.taken=true;if(lives<3){lives++;pop(k.x+12,k.y,'+1 ❤')}else{score+=50;pop(k.x+12,k.y,'+50')}}
  }
  // tokens
  for(const t of tokens){
    if(t.taken)continue;t.t++;
    if(P.x<t.x+t.r&&P.x+P.w>t.x-t.r&&P.y<t.y+t.r&&P.y+P.h>t.y-t.r){t.taken=true;score+=10}
  }

  // flag / win
  if(P.x+P.w>flag.x+10 && !won){won=true;endGame(true)}

  // camera
  const target=P.x-W*0.38;
  cam+=(target-cam)*0.12;
  cam=Math.max(0,Math.min(cam,LEVEL_W*TILE-W));
}

let pops=[];
function pop(x,y,txt){pops.push({x,y,txt,life:50})}

function hurt(fatal){
  if(demo)return;
  if(P.inv>0&&!fatal)return;
  lives--;
  if(lives<=0||fatal){
    P.dead=true;P.vy=-9;
    if(lives<0)lives=0;
  }else{
    P.inv=90;P.vy=-7;P.vx=-P.face*4;
  }
}

function endGame(victory){
  ended=true;started=false;
  document.getElementById('endScr').classList.remove('hide');
  const t=document.getElementById('endTitle');
  if(victory){t.textContent='平安到家! 🏁';t.className='win';
    document.getElementById('endMsg').textContent='你成功避開了所有酒精怪。接下來,看看酒精在你體內的真實數據吧。';}
  else{t.textContent='被酒精怪追上了…';t.className='lose';
    document.getElementById('endMsg').textContent='沒關係。先看看酒精在身體裡會怎麼變化,再來挑戰一次。';}
  document.getElementById('endScore').textContent='得分 '+score;
}

/* ---------- pixel drawing ---------- */
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h)}

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,COL.sky2);g.addColorStop(1,COL.sky1);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  const hillSizes=[120,90,105];
  const span=180;
  const start=Math.floor((cam*0.4)/span)-2;
  for(let i=start;i<start+12;i++){
    const m7=((i%7)+7)%7;
    const m3=((i%3)+3)%3;
    const offset=[0,-40,20,55,-25,35,-15][m7];
    const hx=i*span - cam*0.4 - 90 + offset;
    const idx=m3+1;
    const hillSpr=SPR['hill_'+idx];
    if(hillSpr){
      const dispW=hillSizes[m3];
      const dispH=dispW*(hillSpr.height/hillSpr.width);
      ctx.save();
      ctx.globalAlpha=0.82;
      ctx.drawImage(hillSpr,hx,GROUND_Y*TILE-dispH,dispW,dispH);
      ctx.restore();
    } else {
      drawHill(hx,GROUND_Y*TILE,120,70);
    }
  }
  for(let i=0;i<8;i++){
    const cx=i*260 - (cam*0.25)%260;
    if(SPR.cloud)ctx.drawImage(SPR.cloud,cx+24,44+(i%3)*26,80,44);
    else drawCloud(cx+40, 50+(i%3)*26);
  }
}
function drawHill(x,baseY,w,h){
  ctx.fillStyle=COL.hill;
  ctx.beginPath();ctx.moveTo(x,baseY);ctx.quadraticCurveTo(x+w/2,baseY-h,x+w,baseY);ctx.closePath();ctx.fill();
}
function drawCloud(x,y){
  ctx.fillStyle=COL.cloud;
  [[0,8,16],[14,0,20],[30,6,16],[12,10,26]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.arc(x+dx,y+dy,r,0,7);ctx.fill()});
}

function drawGround(){
  for(const s of solids){
    const sx=Math.round(s.x-cam);
    if(sx>W||sx+s.w<0)continue;
    if(SPR.brick){
      for(let ty=s.y;ty<s.y+s.h;ty+=TILE)
        for(let tx=sx;tx<sx+s.w;tx+=TILE)
          ctx.drawImage(SPR.brick,Math.round(tx),Math.round(ty),TILE,TILE);
    } else {
      px(sx,s.y,s.w,s.h,COL.ground);
      px(sx,s.y,s.w,6,COL.groundTop);
      ctx.strokeStyle=COL.brickLine;ctx.lineWidth=1;
      for(let yy=s.y+6;yy<s.y+s.h;yy+=16){ctx.beginPath();ctx.moveTo(sx,yy+.5);ctx.lineTo(sx+s.w,yy+.5);ctx.stroke();}
      for(let xx=sx+16;xx<sx+s.w;xx+=32){ctx.beginPath();ctx.moveTo(xx+.5,s.y+6);ctx.lineTo(xx+.5,s.y+s.h);ctx.stroke();}
    }
  }
}

function drawTokens(){
  for(const t of tokens){
    if(t.taken)continue;const x=t.x-cam,y=t.y;
    if(x<-10||x>W+10)continue;
    const bob=Math.sin((t.t)/12)*3;
    if(SPR.token){ctx.drawImage(SPR.token,x-t.r,y+bob-t.r,t.r*2,t.r*2);}
    else{ctx.fillStyle=COL.gold;ctx.beginPath();ctx.arc(x,y+bob,t.r,0,7);ctx.fill();
    ctx.fillStyle=COL.amber2;ctx.beginPath();ctx.arc(x,y+bob,t.r*.5,0,7);ctx.fill();}
  }
}

function drawKit(k){
  if(k.taken)return;const x=k.x-cam,y=k.y+Math.sin(k.t/15)*3;
  if(x<-30||x>W+30)return;
  px(x,y,k.w,k.h,COL.medkit);
  ctx.strokeStyle=COL.faint||'#8a795e';ctx.strokeRect(x+.5,y+.5,k.w-1,k.h-1);
  px(x+k.w/2-3,y+4,6,k.h-8,COL.medCross);
  px(x+5,y+k.h/2-3,k.w-10,6,COL.medCross);
}

function drawEnemy(e){
  if(!e.alive)return;const x=e.x-cam,y=e.y;
  if(x<-40||x>W+40)return;const sway=Math.sin(e.t/8)*1.5;
  if(SPR.enemy){
    const flip=e.vx>0?1:-1;
    ctx.save();
    if(flip<0){ctx.scale(-1,1);ctx.drawImage(SPR.enemy,-(x+e.w),y,e.w,e.h)}
    else ctx.drawImage(SPR.enemy,x,y,e.w,e.h);
    ctx.restore();
    return;
  }
  px(x+sway,y+6,e.w,e.h-6,COL.enemy);
  px(x+sway,y+6,e.w,5,COL.enemy2);
  px(x+e.w/2-4+sway,y,8,8,COL.bottleCap);
  px(x+5+sway,y+14,5,6,COL.enemyEye);
  px(x+e.w-10+sway,y+14,5,6,COL.enemyEye);
  px(x+6+sway,y+16,2,3,'#2a1c08');
  px(x+e.w-9+sway,y+16,2,3,'#2a1c08');
  ctx.strokeStyle='#2a1c08';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+4+sway,y+12);ctx.lineTo(x+11+sway,y+15);
  ctx.moveTo(x+e.w-4+sway,y+12);ctx.lineTo(x+e.w-11+sway,y+15);ctx.stroke();
  const fp=Math.sin(e.t/6)>0?2:-2;
  px(x+3+sway,y+e.h-3,7,4,COL.enemy2);
  px(x+e.w-10+sway+fp,y+e.h-3,7,4,COL.enemy2);
}

function drawPlayer(){
  if(P.inv>0 && frame%6<3 && !P.dead)return;
  const x=P.x-cam,y=P.y,f=P.face;
  if(SPR.player){
    const spr=(!P.onGround&&SPR.player_cap)?SPR.player_cap:SPR.player;
    ctx.save();
    if(f<0){ctx.scale(-1,1);ctx.drawImage(spr,-(x+P.w),y,P.w,P.h)}
    else ctx.drawImage(spr,x,y,P.w,P.h);
    ctx.restore();
    return;
  }
  const walk=P.onGround&&Math.abs(P.vx)>.6?Math.sin(frame/4):0;
  px(x+4,y+24,6,6,COL.player2);
  px(x+P.w-10,y+24-walk*2,6,6,COL.player2);
  px(x+3,y+12,P.w-6,14,COL.player);
  px(x+3,y+12,P.w-6,4,COL.player2);
  px(x+5,y+2,P.w-10,12,COL.skin);
  px(x+4,y,P.w-8,5,COL.cap);
  px(f>0?x+P.w-6:x+2,y+2,4,3,COL.cap);
  px(f>0?x+P.w-9:x+6,y+6,3,3,'#2a1c08');
  px(f>0?x+P.w-5:x+1,y+13,4,8,COL.skin);
}

function drawFlag(){
  const x=flag.x-cam;
  if(x>W+40||x+flag.w*TILE<-40)return;
  px(x,flag.y,5,flag.h,COL.pole);
  const wav=Math.sin(frame/10)*4;
  ctx.fillStyle=COL.flag;
  ctx.beginPath();ctx.moveTo(x+5,flag.y+6);ctx.lineTo(x+40+wav,flag.y+18);ctx.lineTo(x+5,flag.y+30);ctx.closePath();ctx.fill();
  px(x-12,(GROUND_Y)*TILE-18,30,18,COL.amber);
  px(x+16,flag.y+13,5,8,COL.cream);px(x+13,flag.y+16,11,3,COL.cream);
}

function drawPops(){
  ctx.font='bold 15px "Noto Serif TC",serif';ctx.textAlign='center';
  pops=pops.filter(p=>p.life>0);
  for(const p of pops){p.life--;p.y-=.6;
    ctx.fillStyle=`rgba(247,201,94,${p.life/50})`;
    ctx.fillText(p.txt,p.x-cam,p.y);
  }
  ctx.textAlign='left';
}

function drawHUD(){
  ctx.font='bold 16px "Noto Serif TC",serif';
  ctx.fillStyle='#000000';
  ctx.fillText('得分 '+score,14,26);
  for(let i=0;i<3;i++){
    const on=i<lives;
    if(SPR.heart&&SPR.heart_empty){
      ctx.drawImage(on?SPR.heart:SPR.heart_empty,W-44-i*28,10,22,22);
    }else{
      const hx=W-30-i*26, hy=18;
      ctx.fillStyle=on?COL.red:'rgba(246,236,216,.18)';
      ctx.beginPath();
      ctx.moveTo(hx,hy+4);ctx.bezierCurveTo(hx,hy,hx-7,hy,hx-7,hy+5);
      ctx.bezierCurveTo(hx-7,hy+10,hx,hy+12,hx,hy+15);
      ctx.bezierCurveTo(hx,hy+12,hx+7,hy+10,hx+7,hy+5);
      ctx.bezierCurveTo(hx+7,hy,hx,hy,hx,hy+4);ctx.fill();
    }
  }
  if(demo){ctx.fillStyle=COL.amber;ctx.font='bold 14px "Noto Serif TC",serif';ctx.fillText('● AUTO 自動展示中（按 D 關閉）',W/2-90,24);}
  const prog=Math.min(1,P.x/(flag.x));
  px(14,34,160,6,'rgba(246,236,216,.15)');
  px(14,34,160*prog,6,'#003b8f');
}

/* ---------- loop ---------- */
function loop(){
  if(started&&!ended)update();
  drawBg();drawGround();drawTokens();
  for(const k of kits)drawKit(k);
  for(const e of enemies)drawEnemy(e);
  drawFlag();
  drawPlayer();drawPops();drawHUD();
  requestAnimationFrame(loop);
}

/* ---------- buttons ---------- */
document.getElementById('startBtn').onclick=()=>{
  document.getElementById('startScr').classList.add('hide');
  reset(true);started=true;ended=false;
};
document.getElementById('againBtn').onclick=()=>{
  document.getElementById('endScr').classList.add('hide');
  reset(true);started=true;ended=false;
};

reset(true);started=false;
loop();
</script>
